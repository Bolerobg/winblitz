version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: winblitz_db
    restart: always
    environment:
      POSTGRES_DB: winblitz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: winblitz_web
    restart: always
    depends_on:
      - db
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/winblitz?sslmode=disable
      - PORT=3005

volumes:
  postgres_data:
