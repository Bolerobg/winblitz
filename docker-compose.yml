version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: winblitz_db
    restart: always
    environment:
      POSTGRES_DB: winblitz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: winblitz_web
    restart: always
    depends_on:
      - db
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/winblitz?sslmode=disable
      - PORT=3005
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=your_email@gmail.com
      - SMTP_PASS=your_google_app_password
      - SMTP_FROM="WinBlitz ⚡" <your_email@gmail.com>

volumes:
  postgres_data:
